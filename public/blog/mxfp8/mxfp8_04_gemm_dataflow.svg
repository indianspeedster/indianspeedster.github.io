<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700" font-family="system-ui, -apple-system, sans-serif">
  <text x="550" y="28" text-anchor="middle" font-size="19" font-weight="600" fill="#1e1e1e">MXFP8 GEMM Dataflow: HBM → On-the-fly Dequant → Matrix Core Multiply-Accumulate</text>

  <!-- Stage labels -->
  <text x="180" y="60" text-anchor="middle" font-size="13" fill="#868e96">① HBM Input</text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#868e96">② On-the-fly Dequant</text>
  <text x="900" y="60" text-anchor="middle" font-size="13" fill="#868e96">③ MFMA Matrix Core</text>

  <!-- Matrix A input -->
  <rect x="40" y="80" width="220" height="90" fill="#a5d8ff" stroke="#74c0fc" stroke-width="2" rx="8"/>
  <text x="150" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Matrix A (activation)</text>
  <text x="150" y="130" text-anchor="middle" font-size="12" fill="#495057">M×K, MXFP8 format</text>
  <text x="150" y="148" text-anchor="middle" font-size="12" fill="#495057">E4M3 data + E8M0 scales</text>

  <!-- Arrow A -->
  <line x1="262" y1="125" x2="360" y2="125" stroke="#495057" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Matrix B input -->
  <rect x="40" y="190" width="220" height="90" fill="#d0bfff" stroke="#9775fa" stroke-width="2" rx="8"/>
  <text x="150" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Matrix B (weight)</text>
  <text x="150" y="240" text-anchor="middle" font-size="12" fill="#495057">K×N, MXFP8 format</text>
  <text x="150" y="258" text-anchor="middle" font-size="12" fill="#495057">E4M3 data + E8M0 scales</text>

  <!-- Arrow B -->
  <line x1="262" y1="235" x2="360" y2="235" stroke="#495057" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Dequantize box -->
  <rect x="365" y="120" width="260" height="200" fill="#fff3bf" stroke="#fcc419" stroke-width="2" rx="8"/>
  <text x="495" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">On-the-fly Dequant</text>
  <text x="495" y="178" text-anchor="middle" font-size="12" fill="#495057">Happens inside the matrix core,</text>
  <text x="495" y="196" text-anchor="middle" font-size="12" fill="#495057">no intermediate HBM write</text>
  <line x1="385" y1="212" x2="605" y2="212" stroke="#dee2e6" stroke-width="1"/>

  <text x="495" y="235" text-anchor="middle" font-size="12" fill="#2b8a3e">A_fp32 = A_e4m3 × 2^A_e8m0</text>
  <text x="495" y="255" text-anchor="middle" font-size="12" fill="#2b8a3e">B_fp32 = B_e4m3 × 2^B_e8m0</text>
  <line x1="385" y1="270" x2="605" y2="270" stroke="#dee2e6" stroke-width="1"/>
  <text x="495" y="288" text-anchor="middle" font-size="11" fill="#868e96">Scale is power-of-2 →</text>
  <text x="495" y="305" text-anchor="middle" font-size="11" fill="#868e96">dequant = bit-shift (≈ zero cost)</text>

  <!-- Arrow to matrix core -->
  <line x1="627" y1="200" x2="740" y2="200" stroke="#495057" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Matrix Core box -->
  <rect x="745" y="120" width="260" height="140" fill="#b2f2bb" stroke="#40c057" stroke-width="2" rx="8"/>
  <text x="875" y="152" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Matrix Core (MFMA)</text>
  <text x="875" y="178" text-anchor="middle" font-size="12" fill="#2b8a3e">A_fp32 × B_fp32</text>
  <text x="875" y="198" text-anchor="middle" font-size="12" fill="#2b8a3e">+ scale product adjustment</text>
  <text x="875" y="222" text-anchor="middle" font-size="12" fill="#495057">Accumulate in FP32</text>
  <rect x="770" y="234" width="210" height="20" fill="#e9ecef" stroke="#ced4da" stroke-width="1" rx="3"/>
  <text x="875" y="248" text-anchor="middle" font-size="11" fill="#495057">V_MFMA_F32_32x32x16_MXFP8</text>

  <!-- Output -->
  <line x1="875" y1="262" x2="875" y2="335" stroke="#495057" stroke-width="2" marker-end="url(#arrowDark)"/>
  <rect x="745" y="340" width="260" height="65" fill="#e9ecef" stroke="#adb5bd" stroke-width="2" rx="6"/>
  <text x="875" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Output Matrix C [M×N]</text>
  <text x="875" y="385" text-anchor="middle" font-size="12" fill="#495057">BF16 or FP32, write to HBM</text>

  <!-- Bottom details panel -->
  <rect x="40" y="430" width="1020" height="255" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" rx="6"/>

  <text x="60" y="458" font-size="14" font-weight="600" fill="#1e1e1e">CDNA4 MXFP8 MFMA Instructions (gfx950)</text>
  <text x="60" y="480" font-size="12" fill="#495057">• V_MFMA_F32_32x32x16_MXFP8 — 32×32 tile, K=16, FP32 accumulate</text>
  <text x="60" y="497" font-size="12" fill="#495057">• V_MFMA_F32_16x16x32_MXFP8 — 16×16 tile, K=32, FP32 accumulate</text>
  <text x="60" y="514" font-size="12" fill="#495057">• V_MFMA_F32_32x32x32_MXFP8 — 32×32 tile, K=32, FP32 accumulate</text>

  <line x1="60" y1="530" x2="1040" y2="530" stroke="#dee2e6" stroke-width="1"/>

  <text x="60" y="552" font-size="14" font-weight="600" fill="#1e1e1e">Scale Granularity Comparison</text>
  <text x="60" y="574" font-size="12" fill="#495057">Per-tensor scale: 1 scale for all elements → one outlier ruins the whole tensor</text>
  <text x="60" y="592" font-size="12" fill="#495057">Per-token scale:  1 scale per row → one outlier ruins that whole row</text>
  <text x="60" y="610" font-size="12" fill="#2b8a3e" font-weight="600">MXFP8 block scale: 1 scale per 32-element block → outlier damage localized to 31 neighbors only</text>

  <line x1="60" y1="626" x2="1040" y2="626" stroke="#dee2e6" stroke-width="1"/>

  <text x="60" y="648" font-size="13" fill="#495057">Key advantage: MXFP8 packs 2× elements per byte vs FP16 → halved HBM traffic + doubled matrix-core throughput</text>
  <text x="60" y="670" font-size="13" fill="#868e96">The dequant step is a zero-latency bit-shift handled inside the matrix core — no extra instructions, no extra pipeline stages.</text>

  <defs>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>
</svg>