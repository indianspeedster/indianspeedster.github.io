<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" width="1100" height="640" font-family="system-ui, -apple-system, sans-serif">
  <text x="550" y="30" text-anchor="middle" font-size="21" font-weight="600" fill="#1e1e1e">Scale Locality: Per-Tensor vs Per-Token vs MXFP8 — Outlier Damage Radius</text>

  <!-- ===== PER-TENSOR ===== -->
  <text x="180" y="70" text-anchor="middle" font-size="16" font-weight="600" fill="#c92a2a">Per-Tensor Scaling</text>
  <text x="180" y="90" text-anchor="middle" font-size="12" fill="#868e96">One scale for the entire tensor</text>

  <!-- Tensor grid -->
  <rect x="30" y="105" width="290" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" rx="4"/>
  <rect x="42" y="113" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="72" y="128" text-anchor="middle" font-size="10" fill="#495057">3.2</text>
  <rect x="108" y="113" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="138" y="128" text-anchor="middle" font-size="10" fill="#495057">2.8</text>
  <rect x="174" y="113" width="60" height="22" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="204" y="128" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="700">5120!</text>
  <rect x="240" y="113" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="270" y="128" text-anchor="middle" font-size="10" fill="#495057">4.1</text>

  <rect x="42" y="140" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="72" y="155" text-anchor="middle" font-size="10" fill="#495057">0.5</text>
  <rect x="108" y="140" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="138" y="155" text-anchor="middle" font-size="10" fill="#495057">1.1</text>
  <rect x="174" y="140" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="204" y="155" text-anchor="middle" font-size="10" fill="#495057">7.3</text>
  <rect x="240" y="140" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="270" y="155" text-anchor="middle" font-size="10" fill="#495057">0.9</text>

  <rect x="42" y="167" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="72" y="182" text-anchor="middle" font-size="10" fill="#495057">6.0</text>
  <rect x="108" y="167" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="138" y="182" text-anchor="middle" font-size="10" fill="#495057">0.3</text>
  <rect x="174" y="167" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="204" y="182" text-anchor="middle" font-size="10" fill="#495057">2.1</text>
  <rect x="240" y="167" width="60" height="22" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="270" y="182" text-anchor="middle" font-size="10" fill="#495057">4.8</text>

  <!-- Damage: entire tensor -->
  <line x1="175" y1="195" x2="175" y2="215" stroke="#c92a2a" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="30" y="220" width="290" height="28" fill="#ffc9c9" stroke="#ff8787" stroke-width="1.5" rx="4"/>
  <text x="175" y="239" text-anchor="middle" font-size="12" fill="#c92a2a" font-weight="600">All elements lose precision</text>

  <!-- Scale -->
  <rect x="70" y="260" width="210" height="22" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="175" y="275" text-anchor="middle" font-size="11" fill="#c92a2a">one FP32 scale × entire tensor</text>

  <!-- ===== PER-TOKEN ===== -->
  <text x="550" y="70" text-anchor="middle" font-size="16" font-weight="600" fill="#e8590c">Per-Token Scaling</text>
  <text x="550" y="90" text-anchor="middle" font-size="12" fill="#868e96">One scale per row</text>

  <rect x="360" y="105" width="320" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" rx="4"/>
  <!-- Row 1 -->
  <rect x="372" y="113" width="90" height="22" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="417" y="128" text-anchor="middle" font-size="10" fill="#c92a2a">5120!</text>
  <rect x="468" y="113" width="90" height="22" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="513" y="128" text-anchor="middle" font-size="9" fill="#c92a2a">(damaged)</text>
  <rect x="564" y="113" width="90" height="22" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="609" y="128" text-anchor="middle" font-size="10" fill="#c92a2a">4.1</text>
  <!-- Row 2 (healthy) -->
  <rect x="372" y="140" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="417" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">0.5 ✓</text>
  <rect x="468" y="140" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="513" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">1.1 ✓</text>
  <rect x="564" y="140" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="609" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">0.9 ✓</text>
  <!-- Row 3 -->
  <rect x="372" y="167" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="417" y="182" text-anchor="middle" font-size="10" fill="#2b8a3e">2.1 ✓</text>
  <rect x="468" y="167" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="513" y="182" text-anchor="middle" font-size="10" fill="#2b8a3e">0.3 ✓</text>
  <rect x="564" y="167" width="90" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="609" y="182" text-anchor="middle" font-size="10" fill="#2b8a3e">6.0 ✓</text>

  <line x1="520" y1="195" x2="520" y2="215" stroke="#e8590c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="390" y="220" width="260" height="28" fill="#ffe8cc" stroke="#e8590c" stroke-width="1.5" rx="4"/>
  <text x="520" y="239" text-anchor="middle" font-size="12" fill="#e8590c" font-weight="600">That entire row suffers</text>

  <rect x="420" y="260" width="200" height="22" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="520" y="275" text-anchor="middle" font-size="11" fill="#e8590c">scales: one FP32 per row</text>

  <!-- ===== MXFP8 ===== -->
  <text x="930" y="70" text-anchor="middle" font-size="16" font-weight="600" fill="#2b8a3e">MXFP8 Block Scaling</text>
  <text x="930" y="90" text-anchor="middle" font-size="12" fill="#868e96">E8M0 scale per 32 elements</text>

  <rect x="730" y="105" width="330" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" rx="4"/>
  <!-- Block 0 (healthy) -->
  <rect x="742" y="113" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="769" y="128" text-anchor="middle" font-size="10" fill="#2b8a3e">3.2 ✓</text>
  <rect x="802" y="113" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="829" y="128" text-anchor="middle" font-size="10" fill="#2b8a3e">2.8 ✓</text>
  <!-- Outlier block -->
  <rect x="862" y="113" width="55" height="22" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="889" y="128" text-anchor="middle" font-size="10" fill="#c92a2a">5120!</text>
  <rect x="922" y="113" width="55" height="22" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="950" y="128" text-anchor="middle" font-size="9" fill="#c92a2a">(⚠)</text>
  <rect x="982" y="113" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="1009" y="128" text-anchor="middle" font-size="10" fill="#2b8a3e">4.1 ✓</text>

  <!-- Row 2 -->
  <rect x="742" y="140" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="769" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">0.5 ✓</text>
  <rect x="802" y="140" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="829" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">1.1 ✓</text>
  <rect x="862" y="140" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="889" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">7.3 ✓</text>
  <rect x="922" y="140" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="949" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">0.9 ✓</text>
  <rect x="982" y="140" width="55" height="22" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="1009" y="155" text-anchor="middle" font-size="10" fill="#2b8a3e">6.0 ✓</text>

  <line x1="895" y1="195" x2="895" y2="215" stroke="#40c057" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="790" y="220" width="210" height="28" fill="#b2f2bb" stroke="#40c057" stroke-width="1.5" rx="4"/>
  <text x="895" y="239" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="600">Only that 31-element block</text>

  <rect x="790" y="260" width="210" height="22" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="895" y="275" text-anchor="middle" font-size="11" fill="#2b8a3e">scales: E8M0, one per block</text>

  <!-- ===== DAMAGE SUMMARY ===== -->
  <rect x="30" y="310" width="1040" height="90" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" rx="8"/>
  <text x="50" y="337" font-size="15" font-weight="600" fill="#1e1e1e">Outlier Damage Radius — Same Outlier (5120), Three Approaches</text>

  <text x="50" y="363" font-size="13" fill="#c92a2a">Per-tensor:</text>
  <text x="160" y="363" font-size="13" fill="#c92a2a">5000+ elements corrupted — entire tensor's scale shifts</text>
  <text x="50" y="385" font-size="13" fill="#e8590c">Per-token:</text>
  <text x="160" y="385" font-size="13" fill="#e8590c">Entire row corrupted — other rows OK</text>
  <text x="50" y="407" font-size="13" fill="#2b8a3e" font-weight="600">MXFP8:</text>
  <text x="160" y="407" font-size="13" fill="#2b8a3e">31 elements affected — rest of tensor at full precision ✓</text>

  <!-- ===== SPECTRUM ===== -->
  <text x="550" y="440" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">The Spectrum of Scale Granularity</text>
  <line x1="80" y1="490" x2="1020" y2="490" stroke="#adb5bd" stroke-width="2"/>
  <circle cx="80" cy="490" r="7" fill="#c92a2a"/>
  <circle cx="280" cy="490" r="7" fill="#e8590c"/>
  <circle cx="480" cy="490" r="7" fill="#fcc419"/>
  <circle cx="680" cy="490" r="7" fill="#40c057"/>
  <circle cx="880" cy="490" r="7" fill="#9775fa"/>
  <circle cx="1020" cy="490" r="7" fill="#1e1e1e"/>

  <text x="80" y="516" text-anchor="middle" font-size="11" fill="#c92a2a">Per-tensor</text>
  <text x="80" y="532" text-anchor="middle" font-size="10" fill="#868e96">1 / tensor</text>
  <text x="280" y="516" text-anchor="middle" font-size="11" fill="#e8590c">Per-token</text>
  <text x="280" y="532" text-anchor="middle" font-size="10" fill="#868e96">1 / row</text>
  <text x="480" y="516" text-anchor="middle" font-size="11" fill="#f08c00">Block FP8</text>
  <text x="480" y="532" text-anchor="middle" font-size="10" fill="#868e96">1 / 128</text>
  <text x="680" y="516" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="600">MXFP8 ★</text>
  <text x="680" y="532" text-anchor="middle" font-size="11" fill="#2b8a3e">1 / 32</text>
  <text x="880" y="516" text-anchor="middle" font-size="11" fill="#9775fa">MXFP4</text>
  <text x="880" y="532" text-anchor="middle" font-size="10" fill="#868e96">1 / 32</text>
  <text x="1020" y="516" text-anchor="middle" font-size="11" fill="#495057">BF16/FP32</text>
  <text x="1020" y="532" text-anchor="middle" font-size="10" fill="#868e96">1 / 1</text>

  <text x="550" y="565" text-anchor="middle" font-size="12" fill="#868e96">← c̲o̲a̲r̲s̲e̲r̲ — outliers hurt more — cheaper scales ————————————————————————— f̲i̲n̲e̲r̲ — better precision — expensive →</text>

  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#40c057"/>
    </marker>
  </defs>
</svg>