<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650" font-family="system-ui, -apple-system, sans-serif">
  <text x="600" y="30" text-anchor="middle" font-size="21" font-weight="600" fill="#1e1e1e">Scale Locality: Per-Tensor vs Per-Token vs MXFP8 — Outlier Damage Radius</text>

  <!-- ========== THREE-COLUMN LAYOUT ========== -->
  <!-- Column bounds: Col1=30-390, Col2=405-775, Col3=790-1170 -->

  <!-- ===== COLUMN 1: PER-TENSOR ===== -->
  <rect x="30" y="60" width="360" height="310" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="210" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#c92a2a">Per-Tensor Scaling</text>
  <text x="210" y="105" text-anchor="middle" font-size="12" fill="#868e96">One scale for the entire tensor</text>

  <!-- Tensor grid -->
  <rect x="55" y="120" width="310" height="75" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5" rx="4"/>
  <rect x="65" y="127" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="97" y="141" text-anchor="middle" font-size="10" fill="#495057">3.2</text>
  <rect x="135" y="127" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="167" y="141" text-anchor="middle" font-size="10" fill="#495057">2.8</text>
  <rect x="205" y="127" width="65" height="20" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="237" y="141" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="700">5120!</text>
  <rect x="275" y="127" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="307" y="141" text-anchor="middle" font-size="10" fill="#495057">4.1</text>

  <rect x="65" y="152" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="97" y="166" text-anchor="middle" font-size="10" fill="#495057">0.5</text>
  <rect x="135" y="152" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="167" y="166" text-anchor="middle" font-size="10" fill="#495057">1.1</text>
  <rect x="205" y="152" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="237" y="166" text-anchor="middle" font-size="10" fill="#495057">7.3</text>
  <rect x="275" y="152" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="307" y="166" text-anchor="middle" font-size="10" fill="#495057">0.9</text>

  <rect x="65" y="177" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="97" y="191" text-anchor="middle" font-size="10" fill="#495057">6.0</text>
  <rect x="135" y="177" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="167" y="191" text-anchor="middle" font-size="10" fill="#495057">0.3</text>
  <rect x="205" y="177" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="237" y="191" text-anchor="middle" font-size="10" fill="#495057">2.1</text>
  <rect x="275" y="177" width="65" height="20" fill="#e9ecef" stroke="#adb5bd" rx="2"/>
  <text x="307" y="191" text-anchor="middle" font-size="10" fill="#495057">4.8</text>

  <!-- Damage -->
  <rect x="55" y="215" width="310" height="26" fill="#ffc9c9" stroke="#ff8787" stroke-width="1.5" rx="4"/>
  <text x="210" y="233" text-anchor="middle" font-size="13" fill="#c92a2a" font-weight="600">All elements lose precision</text>

  <!-- Scale indicator -->
  <rect x="80" y="260" width="260" height="24" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="210" y="277" text-anchor="middle" font-size="11" fill="#c92a2a">one FP32 scale × entire tensor</text>

  <!-- Outlier impact note -->
  <text x="210" y="315" text-anchor="middle" font-size="11" fill="#c92a2a">Damage radius: thousands of elements</text>

  <!-- ===== COLUMN 2: PER-TOKEN ===== -->
  <rect x="420" y="60" width="360" height="310" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="600" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#e8590c">Per-Token Scaling</text>
  <text x="600" y="105" text-anchor="middle" font-size="12" fill="#868e96">One scale per row</text>

  <rect x="445" y="120" width="310" height="75" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5" rx="4"/>

  <rect x="455" y="127" width="100" height="20" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="505" y="141" text-anchor="middle" font-size="10" fill="#c92a2a">5120!</text>
  <rect x="560" y="127" width="100" height="20" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="610" y="141" text-anchor="middle" font-size="10" fill="#c92a2a">(damaged)</text>
  <rect x="665" y="127" width="80" height="20" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="705" y="141" text-anchor="middle" font-size="10" fill="#c92a2a">4.1</text>

  <rect x="455" y="152" width="100" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="505" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">0.5 ✓</text>
  <rect x="560" y="152" width="100" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="610" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">1.1 ✓</text>
  <rect x="665" y="152" width="80" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="705" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">0.9 ✓</text>

  <rect x="455" y="177" width="100" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="505" y="191" text-anchor="middle" font-size="10" fill="#2b8a3e">2.1 ✓</text>
  <rect x="560" y="177" width="100" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="610" y="191" text-anchor="middle" font-size="10" fill="#2b8a3e">0.3 ✓</text>
  <rect x="665" y="177" width="80" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="705" y="191" text-anchor="middle" font-size="10" fill="#2b8a3e">6.0 ✓</text>

  <rect x="445" y="215" width="310" height="26" fill="#ffe8cc" stroke="#e8590c" stroke-width="1.5" rx="4"/>
  <text x="600" y="233" text-anchor="middle" font-size="13" fill="#e8590c" font-weight="600">That entire row suffers</text>

  <rect x="470" y="260" width="260" height="24" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="600" y="277" text-anchor="middle" font-size="11" fill="#e8590c">scales: one FP32 per row</text>

  <text x="600" y="315" text-anchor="middle" font-size="11" fill="#e8590c">Damage radius: entire row (K elements)</text>

  <!-- ===== COLUMN 3: MXFP8 ===== -->
  <rect x="810" y="60" width="360" height="310" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="990" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#2b8a3e">MXFP8 Block Scaling</text>
  <text x="990" y="105" text-anchor="middle" font-size="12" fill="#868e96">E8M0 scale per 32 elements</text>

  <rect x="835" y="120" width="310" height="75" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5" rx="4"/>

  <rect x="845" y="127" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="872" y="141" text-anchor="middle" font-size="10" fill="#2b8a3e">3.2 ✓</text>
  <rect x="905" y="127" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="932" y="141" text-anchor="middle" font-size="10" fill="#2b8a3e">2.8 ✓</text>
  <rect x="965" y="127" width="55" height="20" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="2"/>
  <text x="992" y="141" text-anchor="middle" font-size="10" fill="#c92a2a">5120!</text>
  <rect x="1025" y="127" width="55" height="20" fill="#ffc9c9" stroke="#ff8787" rx="2"/>
  <text x="1052" y="141" text-anchor="middle" font-size="9" fill="#c92a2a">(⚠)</text>
  <rect x="1085" y="127" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="1112" y="141" text-anchor="middle" font-size="10" fill="#2b8a3e">4.1 ✓</text>

  <rect x="845" y="152" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="872" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">0.5 ✓</text>
  <rect x="905" y="152" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="932" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">1.1 ✓</text>
  <rect x="965" y="152" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="992" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">7.3 ✓</text>
  <rect x="1025" y="152" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="1052" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">0.9 ✓</text>
  <rect x="1085" y="152" width="55" height="20" fill="#b2f2bb" stroke="#69db7c" rx="2"/>
  <text x="1112" y="166" text-anchor="middle" font-size="10" fill="#2b8a3e">6.0 ✓</text>

  <line x1="992" y1="198" x2="992" y2="212" stroke="#40c057" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="835" y="215" width="310" height="26" fill="#b2f2bb" stroke="#40c057" stroke-width="1.5" rx="4"/>
  <text x="990" y="233" text-anchor="middle" font-size="13" fill="#2b8a3e" font-weight="600">Only that 31-element block</text>

  <rect x="860" y="260" width="260" height="24" fill="#e9ecef" stroke="#868e96" stroke-width="1" rx="3"/>
  <text x="990" y="277" text-anchor="middle" font-size="11" fill="#2b8a3e">scales: E8M0, one per block</text>

  <text x="990" y="315" text-anchor="middle" font-size="11" fill="#2b8a3e">Damage radius: 31 elements only ✓</text>

  <!-- ===== DAMAGE SUMMARY ===== -->
  <rect x="30" y="395" width="1140" height="65" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" rx="8"/>
  <text x="60" y="420" font-size="14" font-weight="600" fill="#1e1e1e">Outlier Damage Radius — Same Outlier (5120), Three Approaches</text>
  <text x="60" y="445" font-size="13" fill="#c92a2a">Per-tensor: 5000+ elements corrupted — entire tensor's scale shifts</text>
  <text x="60" y="465" font-size="13" fill="#e8590c">Per-token: Entire row corrupted — other rows OK</text>
  <text x="460" y="445" font-size="13" fill="#2b8a3e" font-weight="600">MXFP8: 31 elements affected — rest of tensor at full precision ✓</text>

  <!-- ===== SPECTRUM ===== -->
  <text x="600" y="510" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">The Spectrum of Scale Granularity</text>
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#adb5bd" stroke-width="2"/>
  <circle cx="80" cy="555" r="7" fill="#c92a2a"/>
  <circle cx="290" cy="555" r="7" fill="#e8590c"/>
  <circle cx="500" cy="555" r="7" fill="#fcc419"/>
  <circle cx="710" cy="555" r="7" fill="#40c057"/>
  <circle cx="920" cy="555" r="7" fill="#9775fa"/>
  <circle cx="1120" cy="555" r="7" fill="#1e1e1e"/>

  <text x="80" y="580" text-anchor="middle" font-size="11" fill="#c92a2a">Per-tensor</text>
  <text x="80" y="595" text-anchor="middle" font-size="10" fill="#868e96">1 / tensor</text>
  <text x="290" y="580" text-anchor="middle" font-size="11" fill="#e8590c">Per-token</text>
  <text x="290" y="595" text-anchor="middle" font-size="10" fill="#868e96">1 / row</text>
  <text x="500" y="580" text-anchor="middle" font-size="11" fill="#f08c00">Block FP8</text>
  <text x="500" y="595" text-anchor="middle" font-size="10" fill="#868e96">1 / 128</text>
  <text x="710" y="580" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="600">MXFP8 ★</text>
  <text x="710" y="595" text-anchor="middle" font-size="11" fill="#2b8a3e">1 / 32</text>
  <text x="920" y="580" text-anchor="middle" font-size="11" fill="#9775fa">MXFP4</text>
  <text x="920" y="595" text-anchor="middle" font-size="10" fill="#868e96">1 / 32</text>
  <text x="1120" y="580" text-anchor="middle" font-size="11" fill="#495057">BF16/FP32</text>
  <text x="1120" y="595" text-anchor="middle" font-size="10" fill="#868e96">1 / 1</text>

  <text x="600" y="630" text-anchor="middle" font-size="12" fill="#868e96">← coarser — outliers hurt more — cheaper scales  ···············  finer — better precision — expensive →</text>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#40c057"/>
    </marker>
  </defs>
</svg>