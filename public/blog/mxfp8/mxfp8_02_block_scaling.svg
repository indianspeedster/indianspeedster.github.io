<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="1100" height="800" font-family="system-ui, -apple-system, sans-serif">
  <text x="550" y="30" text-anchor="middle" font-size="21" font-weight="600" fill="#1e1e1e">MXFP8 Block-Level Scaling: 32 Elements, 1 Shared Scale</text>

  <!-- Step 1: Original Tensor -->
  <text x="60" y="75" font-size="15" font-weight="600" fill="#1e1e1e">① Original Tensor (FP32/BF16)</text>
  <rect x="60" y="90" width="520" height="50" fill="#f1f3f5" stroke="#adb5bd" stroke-width="2" rx="4"/>
  <text x="320" y="120" text-anchor="middle" font-size="13" fill="#495057">[K dimension: 320 values at FP32/BF16]</text>

  <!-- Arrow down -->
  <line x1="320" y1="144" x2="320" y2="180" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="340" y="168" font-size="13" fill="#868e96">Split into blocks of 32</text>

  <!-- Step 2: Block Partitioning -->
  <text x="60" y="205" font-size="15" font-weight="600" fill="#1e1e1e">② Block Partitioning (10 blocks)</text>

  <rect x="60" y="220" width="48" height="38" fill="#d0bfff" stroke="#9775fa" stroke-width="1" rx="3"/>
  <text x="84" y="244" text-anchor="middle" font-size="14" fill="#1e1e1e">B₀</text>
  <rect x="112" y="220" width="48" height="38" fill="#d0bfff" stroke="#9775fa" stroke-width="1" rx="3"/>
  <text x="136" y="244" text-anchor="middle" font-size="14" fill="#1e1e1e">B₁</text>
  <text x="172" y="244" font-size="16" fill="#868e96">...</text>
  <rect x="200" y="220" width="48" height="38" fill="#d0bfff" stroke="#9775fa" stroke-width="1" rx="3"/>
  <text x="224" y="244" text-anchor="middle" font-size="14" fill="#1e1e1e">B₅</text>
  <text x="260" y="244" font-size="16" fill="#868e96">...</text>
  <rect x="290" y="220" width="48" height="38" fill="#d0bfff" stroke="#9775fa" stroke-width="1" rx="3"/>
  <text x="314" y="244" text-anchor="middle" font-size="14" fill="#1e1e1e">B₉</text>

  <!-- Arrow down -->
  <line x1="320" y1="262" x2="320" y2="310" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="340" y="290" font-size="13" fill="#868e96">Per-block: find max → compute scale → quantize E4M3</text>

  <!-- Step 3: MXFP8 Storage -->
  <text x="60" y="345" font-size="15" font-weight="600" fill="#1e1e1e">③ MXFP8 Storage — Block B₅ Example (highlighted)</text>

  <!-- Scale box -->
  <rect x="60" y="360" width="120" height="52" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="6"/>
  <text x="120" y="380" text-anchor="middle" font-size="13" fill="#c92a2a">Scale = 2⁴</text>
  <text x="120" y="398" text-anchor="middle" font-size="12" fill="#c92a2a">(E8M0: 0x84)</text>

  <text x="192" y="392" text-anchor="middle" font-size="20" fill="#1e1e1e">+</text>

  <!-- E4M3 elements - spaced out more -->
  <rect x="215" y="365" width="44" height="48" fill="#a5d8ff" stroke="#74c0fc" stroke-width="1" rx="3"/>
  <text x="237" y="385" text-anchor="middle" font-size="11" fill="#1e1e1e">e₀</text>
  <text x="237" y="400" text-anchor="middle" font-size="10" fill="#495057">E4M3</text>

  <rect x="266" y="365" width="44" height="48" fill="#a5d8ff" stroke="#74c0fc" stroke-width="1" rx="3"/>
  <text x="288" y="385" text-anchor="middle" font-size="11" fill="#1e1e1e">e₁</text>
  <text x="288" y="400" text-anchor="middle" font-size="10" fill="#495057">E4M3</text>

  <text x="320" y="395" font-size="16" fill="#868e96">...</text>

  <rect x="345" y="365" width="44" height="48" fill="#a5d8ff" stroke="#74c0fc" stroke-width="1" rx="3"/>
  <text x="367" y="385" text-anchor="middle" font-size="11" fill="#1e1e1e">e₃₁</text>
  <text x="367" y="400" text-anchor="middle" font-size="10" fill="#495057">E4M3</text>

  <!-- Total storage result -->
  <rect x="420" y="360" width="230" height="52" fill="#e9ecef" stroke="#adb5bd" stroke-width="1" rx="4"/>
  <text x="535" y="380" text-anchor="middle" font-size="13" fill="#2b8a3e">32 × 8b + 8b = 264 bits</text>
  <text x="535" y="400" text-anchor="middle" font-size="13" fill="#2b8a3e">= 8.25 bits/element (1.03 bytes)</text>

  <!-- Arrow -->
  <line x1="320" y1="420" x2="320" y2="470" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="340" y="450" font-size="13" fill="#868e96">Dequantize: x̂ᵢ = xᵢ(E4M3) × 2^scale</text>

  <!-- Step 4 -->
  <text x="60" y="500" font-size="15" font-weight="600" fill="#1e1e1e">④ Recovered Values (BF16/FP32)</text>
  <rect x="60" y="515" width="520" height="42" fill="#b2f2bb" stroke="#69db7c" stroke-width="2" rx="4"/>
  <text x="320" y="541" text-anchor="middle" font-size="14" fill="#2b8a3e">Full FP32 dynamic range, 6% E4M3 precision per element</text>

  <!-- Storage overhead box -->
  <rect x="60" y="590" width="960" height="70" fill="#fff3bf" stroke="#fcc419" stroke-width="1.5" rx="6"/>
  <text x="80" y="615" font-size="14" font-weight="600" fill="#1e1e1e">💡 Storage Overhead</text>
  <text x="80" y="635" font-size="13" fill="#495057">Raw FP8:  32 bytes for 32 elements │  MXFP8: 33 bytes (32 data + 1 scale) │  Overhead: 1 byte / 33 = 3.0%</text>
  <text x="80" y="653" font-size="13" fill="#495057">BF16 needs 64 bytes for 32 elements — MXFP8 uses 1.94× less memory with the same dynamic range.</text>

  <!-- Outlier localization -->
  <rect x="60" y="690" width="960" height="85" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" rx="6"/>
  <text x="80" y="715" font-size="14" font-weight="600" fill="#1e1e1e">Outlier Localization</text>
  <text x="80" y="738" font-size="12" fill="#495057">Per-tensor scaling: 1 scale for all elements → one outlier at 5000 sets the scale → ALL elements lose precision</text>
  <text x="80" y="755" font-size="12" fill="#495057">Per-token scaling:  1 scale per row → one outlier ruins that entire row</text>
  <text x="80" y="772" font-size="12" fill="#2b8a3e" font-weight="600">MXFP8 block scaling: 1 scale per 32 elements → outlier damage localized to just 31 neighbors</text>

  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
  </defs>
</svg>