<text x="40" y="42.8" font-size="24" text-anchor="start" fill="#1e1e1e" font-weight="bold">Same tile, two generations</text>
<text x="490.0" y="95.375" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MXFP8 GEMM tile  —  256 threads (4 waves)  ·  96 VGPR/thread  ·  48 SGPR/wave  ·  32 KB LDS / workgroup</text>
<text x="70" y="263.3" font-size="14" text-anchor="start" fill="#868e96" font-weight="normal">waves</text>
<text x="70" y="280.8" font-size="14" text-anchor="start" fill="#868e96" font-weight="normal">/ SIMD</text>
<text x="70" y="298.3" font-size="14" text-anchor="start" fill="#868e96" font-weight="normal">(max 8)</text>
<text x="250" y="146.15" font-size="17" text-anchor="start" fill="#1e1e1e" font-weight="normal">MI300X · CDNA3</text>
<text x="620" y="146.15" font-size="17" text-anchor="start" fill="#1e1e1e" font-weight="normal">MI355X · CDNA4</text>
<text x="330.0" y="487.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">64 KB LDS</text>
<text x="330.0" y="505.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">→ 2 workgroups / CU</text>
<text x="330.0" y="522.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">LDS-bound  ·  2/8 = 25%</text>
<text x="700.0" y="487.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">160 KB LDS</text>
<text x="700.0" y="505.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">→ 5 workgroups / CU</text>
<text x="700.0" y="522.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">register-bound  ·  5/8 = 62.5%</text>
<text x="70" y="574.25" font-size="15" text-anchor="start" fill="#1971c2" font-weight="normal">Tripling LDS doesn&#x27;t just raise occupancy — it moves the bottleneck from LDS to registers.</text>
