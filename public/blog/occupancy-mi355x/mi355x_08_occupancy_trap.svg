<text x="40" y="42.8" font-size="24" text-anchor="start" fill="#1e1e1e" font-weight="bold">Why chasing occupancy can backfire</text>
<text x="260.0" y="96.6" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Chasing occupancy</text>
<text x="260.0" y="164.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">more waves / SIMD</text>
<text x="260.0" y="242.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">fewer VGPRs per wave</text>
<text x="260.0" y="320.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">smaller accumulator tile</text>
<text x="260.0" y="398.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">lower arithmetic intensity</text>
<text x="260.0" y="476.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">matrix core waits on data</text>
<text x="260.0" y="554.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">throughput ↓</text>
<text x="770.0" y="96.6" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Lower occupancy, bigger tiles</text>
<text x="770.0" y="164.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">fewer waves / SIMD</text>
<text x="770.0" y="242.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">more VGPRs per wave</text>
<text x="770.0" y="320.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">bigger tile + ILP</text>
<text x="770.0" y="398.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">higher arithmetic intensity</text>
<text x="770.0" y="476.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">matrix core stays fed</text>
<text x="770.0" y="554.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">throughput ↑</text>
