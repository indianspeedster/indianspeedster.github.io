<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="Comic Sans MS, Segoe Print, sans-serif">
<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#1e1e1e"/></marker></defs>
<rect width="1000" height="600" fill="#ffffff"/>
<text x="40" y="40" font-size="22" fill="#1e1e1e" font-weight="bold">Measured tile sweep: throughput peaks at low occupancy</text>
<text x="40" y="64" font-size="15" fill="#adb5bd">MXFP8 grouped GEMM on MI355X · each point a tile config · rocprofv3 + wall-clock</text>
<line x1="135" y1="90" x2="135" y2="470" stroke="#e9ecef" stroke-width="1"/>
<text x="135" y="494" font-size="14" text-anchor="middle" fill="#1e1e1e">0%</text>
<line x1="362" y1="90" x2="362" y2="470" stroke="#e9ecef" stroke-width="1"/>
<text x="362" y="494" font-size="14" text-anchor="middle" fill="#1e1e1e">10%</text>
<line x1="589" y1="90" x2="589" y2="470" stroke="#e9ecef" stroke-width="1"/>
<text x="589" y="494" font-size="14" text-anchor="middle" fill="#1e1e1e">20%</text>
<line x1="816" y1="90" x2="816" y2="470" stroke="#e9ecef" stroke-width="1"/>
<text x="816" y="494" font-size="14" text-anchor="middle" fill="#1e1e1e">30%</text>
<line x1="135" y1="401" x2="930" y2="401" stroke="#e9ecef" stroke-width="1"/>
<text x="123" y="406" font-size="14" text-anchor="end" fill="#1e1e1e">1000</text>
<line x1="135" y1="263" x2="930" y2="263" stroke="#e9ecef" stroke-width="1"/>
<text x="123" y="268" font-size="14" text-anchor="end" fill="#1e1e1e">1200</text>
<line x1="135" y1="125" x2="930" y2="125" stroke="#e9ecef" stroke-width="1"/>
<text x="123" y="130" font-size="14" text-anchor="end" fill="#1e1e1e">1400</text>
<line x1="135" y1="470" x2="135" y2="84" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
<line x1="135" y1="470" x2="936" y2="470" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
<text x="532" y="524" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="bold">Occupancy (% of max, measured)</text>
<text x="34" y="280" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="bold" transform="rotate(-90 34 280)">Throughput (TFLOP/s)</text>
<line x1="610" y1="152" x2="794" y2="230" stroke="#adb5bd" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ah)"/>
<text x="692" y="158" font-size="12.5" fill="#adb5bd" text-anchor="middle">most occupancy, not the fastest</text>
<circle cx="828" cy="243" r="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
<text x="843" y="248" font-size="15" text-anchor="start" fill="#1e1e1e" font-weight="bold">A · MFMA 29.8%</text>
<circle cx="578" cy="150" r="11" fill="#7048e8" stroke="#7048e8" stroke-width="3"/>
<text x="578" y="130" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="bold">B · MFMA 34.0% (peak)</text>
<circle cx="353" cy="303" r="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
<text x="337" y="307" font-size="15" text-anchor="end" fill="#1e1e1e" font-weight="bold">C · MFMA 25.7%</text>
<circle cx="585" cy="172" r="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
<text x="601" y="192" font-size="15" text-anchor="start" fill="#1e1e1e" font-weight="bold">D · MFMA 33.1%</text>
<circle cx="496" cy="405" r="8" fill="#ffffff" stroke="#e03131" stroke-width="3"/>
<text x="496" y="433" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="bold">E · MFMA 21.8% (spills)</text>
<rect x="428" y="68" width="300" height="38" rx="12" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
<text x="578" y="93" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="bold">peak: 1363 TFLOP/s @ 19.5% occupancy</text>
<text x="532" y="586" font-size="13" text-anchor="middle" fill="#adb5bd">point height (throughput) tracks MFMA%, not its x-position (occupancy)</text>
</svg>