<text x="40" y="42.8" font-size="24" text-anchor="start" fill="#1e1e1e" font-weight="bold">The workflow, in one chart</text>
<text x="410.0" y="98.375" font-size="15" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Open the kernel</text>
<text x="410.0" y="174.4" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Read real resource usage</text>
<text x="410.0" y="191.9" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">(binary, not your head)</text>
<text x="410.0" y="271.4" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Compute 4 limiters → min = ceiling,</text>
<text x="410.0" y="288.9" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">argmin = binding resource</text>
<text x="330" y="401.3" font-size="14" text-anchor="start" fill="#1e1e1e" font-weight="normal">Matrix core / VALU</text>
<text x="330" y="418.8" font-size="14" text-anchor="start" fill="#1e1e1e" font-weight="normal">already saturated?</text>
<text x="710.0" y="409.4" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Occupancy isn&#x27;t your</text>
<text x="710.0" y="426.9" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">problem — stop</text>
<text x="345" y="596.3" font-size="14" text-anchor="start" fill="#1e1e1e" font-weight="normal">Latency-bound?</text>
<text x="345" y="613.8" font-size="14" text-anchor="start" fill="#1e1e1e" font-weight="normal">(units idle, waiting)</text>
<text x="710.0" y="604.4" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Add ILP / wider loads</text>
<text x="710.0" y="621.9" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">(keep occupancy)</text>
<text x="410.0" y="767.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">Grow register tile to just-before-spill</text>
<text x="410.0" y="785.15" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">let occupancy fall</text>
<text x="410.0" y="802.65" font-size="14" text-anchor="middle" fill="#1e1e1e" font-weight="normal">LDS → pipeline depth</text>
<text x="545" y="403.4" font-size="12" text-anchor="start" fill="#2b8a3e" font-weight="normal">YES</text>
<text x="420" y="513.4" font-size="12" text-anchor="start" fill="#868e96" font-weight="normal">NO</text>
<text x="545" y="598.4" font-size="12" text-anchor="start" fill="#1971c2" font-weight="normal">YES</text>
<text x="420" y="711.4" font-size="12" text-anchor="start" fill="#2b8a3e" font-weight="normal">NO</text>
</svg>