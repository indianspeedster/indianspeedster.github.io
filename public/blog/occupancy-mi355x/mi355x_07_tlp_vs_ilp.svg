<text x="40" y="42.8" font-size="24" text-anchor="start" fill="#1e1e1e" font-weight="bold">Two routes to the same parallelism: TLP vs ILP</text>
<text x="60" y="109.1" font-size="18" text-anchor="start" fill="#1e1e1e" font-weight="normal">TLP — raise occupancy</text>
<text x="60" y="133.3" font-size="14" text-anchor="start" fill="#868e96" font-weight="normal">many waves, one MFMA each</text>
<text x="170.0" y="178.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="390.0" y="178.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="170.0" y="242.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="390.0" y="242.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="170.0" y="306.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="390.0" y="306.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="170.0" y="370.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="390.0" y="370.925" font-size="13" text-anchor="middle" fill="#1e1e1e" font-weight="normal">wave: 1 MFMA</text>
<text x="620" y="109.1" font-size="18" text-anchor="start" fill="#1e1e1e" font-weight="normal">ILP — fewer waves, more each</text>
<text x="620" y="133.3" font-size="14" text-anchor="start" fill="#868e96" font-weight="normal">few waves, several independent tiles</text>
<text x="632" y="170.35" font-size="13" text-anchor="start" fill="#1e1e1e" font-weight="normal">wave 0</text>
<text x="686.0" y="211.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="686.0" y="226.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="788.0" y="211.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="788.0" y="226.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="890.0" y="211.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="890.0" y="226.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="992.0" y="211.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="992.0" y="226.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="632" y="305.35" font-size="13" text-anchor="start" fill="#1e1e1e" font-weight="normal">wave 1</text>
<text x="686.0" y="346.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="686.0" y="361.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="788.0" y="346.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="788.0" y="361.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="890.0" y="346.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="890.0" y="361.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="992.0" y="346.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">MFMA</text>
<text x="992.0" y="361.2" font-size="12" text-anchor="middle" fill="#1e1e1e" font-weight="normal">tile</text>
<text x="560.0" y="506.6" font-size="16" text-anchor="middle" fill="#1e1e1e" font-weight="normal">≈ 8 independent MFMAs in flight  →  matrix core at peak</text>
<text x="80" y="572.35" font-size="13" text-anchor="start" fill="#495057" font-weight="normal">Little&#x27;s Law: parallelism-in-flight = latency × throughput. The matrix core wants independent MFMAs — it doesn&#x27;t care whether they</text>
<text x="80" y="588.6" font-size="13" text-anchor="start" fill="#495057" font-weight="normal">come from different waves or from one wave. On CDNA4 they accumulate into AccVGPRs (a separate pool), so ILP tiles don&#x27;t evict operands.</text>
