<rect x="140.0" y="208" width="600" height="80" rx="12" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
<line x1="440.0" y1="170" x2="440.0" y2="208" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)" />
<rect x="180.0" y="326" width="520" height="80" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
<line x1="440.0" y1="288" x2="440.0" y2="326" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)" />
<rect x="220.0" y="444" width="440" height="80" rx="12" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
<line x1="440.0" y1="406" x2="440.0" y2="444" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)" />
<rect x="260.0" y="562" width="360" height="80" rx="12" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
