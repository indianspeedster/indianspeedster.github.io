<text x="40" y="44.7" font-size="26" text-anchor="start" fill="#1e1e1e" font-weight="bold">MI355X: from chip to lane</text>
<text x="440.0" y="118.2" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">AMD Instinct MI355X  —  CDNA4 / gfx950</text>
<text x="440.0" y="139.45" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">288 GB HBM3E · 8 TB/s · 256 MB Infinity Cache · 2.4 GHz</text>
<text x="440.0" y="241.2" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">8 × XCD  (Accelerator Complex Die)</text>
<text x="440.0" y="262.45" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">each with its own L2 slice</text>
<text x="440.0" y="359.2" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">32 × Compute Unit  per XCD</text>
<text x="440.0" y="380.45" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">256 Compute Units total</text>
<text x="440.0" y="477.2" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">4 × SIMD  per Compute Unit</text>
<text x="440.0" y="498.45" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">register file is private to each SIMD</text>
<text x="440.0" y="595.2" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">64 lanes  per SIMD</text>
<text x="440.0" y="616.45" font-size="17" text-anchor="middle" fill="#1e1e1e" font-weight="normal">1 wavefront = 64 threads in lockstep</text>
</svg>